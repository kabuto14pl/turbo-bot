# ═══════════════════════════════════════════════════════════════════════
# PATCH #38: GPU Production Docker Compose
# Usage: docker-compose -f docker-compose.prod-gpu.yml up -d
# Requires: NVIDIA Container Runtime (nvidia-docker2)
# ═══════════════════════════════════════════════════════════════════════

services:
  turbo-bot:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: turbo-bot-gpu
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NODE_ENV=production
      - GPU_FORCED=true
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    ports:
      - "3001:3001"
      - "8080:8080"
    volumes:
      - ./.env:/app/.env:ro
      - ./data:/app/data
      - bot-state:/app/state
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  bot-state:
    driver: local
