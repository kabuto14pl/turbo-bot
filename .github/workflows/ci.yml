# Turbo Bot CI Pipeline
# Uruchamia się na KAŻDYM pushu do master — łapie bugi PRZED deployem na VPS

name: CI — Lint, Syntax & Tests

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  NODE_VERSION: '20.x'

jobs:
  # ─── SYNTAX CHECK ────────────────────────────────────────────────────
  syntax:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check JS syntax (core files)
        run: |
          echo "Checking syntax of core bot files..."
          ERRORS=0
          for f in trading-bot/src/modules/bot.js trading-bot/src/core/ai/*.js trading-bot/src/modules/*.js; do
            if [ -f "$f" ]; then
              node --check "$f" 2>&1 || { echo "SYNTAX ERROR: $f"; ERRORS=$((ERRORS+1)); }
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "$ERRORS file(s) with syntax errors!"
            exit 1
          fi
          echo "All core files passed syntax check"

  # ─── LINT ─────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts

      - name: Lint core bot files
        run: |
          npx eslint \
            trading-bot/src/modules/bot.js \
            trading-bot/src/core/ai/*.js \
            trading-bot/src/modules/*.js \
            --max-warnings 30 \
            --format stylish

  # ─── TESTS ────────────────────────────────────────────────────────────
  test:
    name: Critical Tests
    runs-on: ubuntu-latest
    needs: [syntax]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts

      - name: Run critical bug tests
        run: npx jest src/__tests__/critical-bugs.test.js --verbose --no-cache

  # ─── DEPLOY GATE ──────────────────────────────────────────────────────
  deploy-ready:
    name: Deploy Gate
    runs-on: ubuntu-latest
    needs: [syntax, lint, test]
    steps:
      - name: All checks passed
        run: echo "All quality gates passed — safe to deploy to VPS"
